<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд реализации целей и критериев успеха пилота - Северсталь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                linear-gradient(rgba(0, 51, 102, 0.88), rgba(0, 51, 102, 0.88)),
                url('https://images.unsplash.com/photo-1565688534245-05d6b5be184a?w=1920&q=80') center/cover fixed;
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #003366 0%, #0051a3 100%);
            color: white;
            padding: 40px 50px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 51, 102, 0.4);
            border: 3px solid #0066cc;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            border-left: 5px solid #003366;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #003366;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #003366;
        }

        .goal-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border: 2px solid #e6f2ff;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #003366;
        }

        .goal-title {
            font-size: 1.8em;
            color: #003366;
            font-weight: bold;
            flex: 1;
        }

        .goal-progress {
            font-size: 2em;
            font-weight: bold;
            color: #0066cc;
            margin-left: 20px;
        }

        .status-selector {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .status-badge.not-started {
            background: #e0e0e0;
            color: #666;
        }

        .status-badge.in-progress {
            background: #fff3cd;
            color: #856404;
            border-color: #ffc107;
        }

        .status-badge.completed {
            background: #d4edda;
            color: #155724;
            border-color: #28a745;
        }

        .status-badge.active {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .progress-bar-container {
            background: #e6f2ff;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #003366 0%, #0066cc 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
        }

        .criteria-section {
            margin-top: 25px;
        }

        .criterion {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #0066cc;
        }

        .criterion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .criterion-title {
            font-weight: bold;
            color: #003366;
            font-size: 1.1em;
            flex: 1;
        }

        .criterion-progress {
            font-size: 1.3em;
            font-weight: bold;
            color: #0066cc;
            margin-left: 15px;
        }

        .employee-list,
        .employee-list-connected {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .employee-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }

        .employee-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .employee-name {
            font-weight: 600;
            color: #333;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-label {
            font-size: 0.85em;
            color: #666;
        }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #003366;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            margin-top: 10px;
        }

        .weekly-data {
            margin-top: 20px;
        }

        .week-entry {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
        }

        .week-entry input {
            flex: 1;
            margin-top: 0;
        }

        .delete-week-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-employee-btn {
            background: #dc3545;
            color: white;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .delete-employee-btn:hover {
            background: #b02a37;
            transform: scale(1.1);
        }

        .add-week-btn {
            background: #003366;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            min-height: 350px;
        }

        .chart-bar-wrapper {
            display: inline-block;
            vertical-align: bottom;
            text-align: center;
            margin: 0 10px;
        }

        .chart-bar {
            width: 80px;
            border-radius: 8px 8px 0 0;
            position: relative;
        }

        .chart-value {
            color: white;
            font-weight: bold;
            padding: 5px;
            font-size: 0.9em;
        }

        .chart-diff {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8em;
            font-weight: bold;
            white-space: nowrap;
        }

        .chart-diff.positive {
            color: #28a745;
        }

        .chart-diff.negative {
            color: #dc3545;
        }

        .chart-label {
            font-size: 0.85em;
            margin-top: 8px;
            color: #666;
        }

        .admin-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            border: 2px solid #003366;
        }

        .simple-checkbox {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .simple-checkbox label {
            font-weight: 500;
            flex: 1;
        }

        .view-only-banner {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #000;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            display: none;
        }

        .view-only-banner.show {
            display: block;
        }

        .sync-status {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            font-size: 0.9em;
            z-index: 999;
            border: 2px solid #0066cc;
            display: none;
        }

        .sync-status.show {
            display: block;
        }

        .sync-status.syncing { border-color: #ffc107; background: #fff3cd; }
        .sync-status.synced { border-color: #28a745; background: #d4edda; }
        .sync-status.error { border-color: #dc3545; background: #f8d7da; }

        .readonly * {
            pointer-events: none !important;
            opacity: 0.7 !important;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .goal-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .goal-progress {
                margin-left: 0;
                margin-top: 10px;
            }

            .status-selector {
                margin-left: 0;
                margin-top: 10px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="admin-mode-toggle">
        <label>
            <input type="checkbox" id="adminMode" checked> Режим редактирования
        </label>
    </div>

    <div class="sync-status" id="syncStatus">
        <span id="syncStatusText">Синхронизация...</span>
    </div>

    <div class="container">
        <div class="view-only-banner" id="viewOnlyBanner">
            👁️ РЕЖИМ ТОЛЬКО ДЛЯ ПРОСМОТРА. Изменения недоступны.
        </div>

        <div class="header">
            <h1>📊 Дашборд реализации целей и критериев успеха пилота</h1>
        </div>

        <!-- блок статов, цели 1–4, списки сотрудников, недели и т.д. остаются такими же, как в вашем исходном файле -->

        <!-- ... тут идёт разметка целей 1–4, критериев и графиков ... -->

    </div>

    <script>
        const FIREBASEURL = "https://severstal-dashboard-default-rtdb.europe-west1.firebasedatabase.app";

        let employees = [];
        let hygieneData = [];
        let accuracyData = [];
        let statuses = {};
        let isViewOnlyMode = false;

        /* вся логика loadFromCloud/saveToCloud/updateGoals/render* как в вашем файле, плюс: */

        function renderEmployees() {
            const container = document.getElementById('employeeList');
            container.innerHTML = employees.map((emp, index) => `
                <div class="employee-item">
                    <div class="employee-header">
                        <div class="employee-name">${emp.name}</div>
                        <div class="checkbox-container">
                            <span class="checkbox-label">Подключен</span>
                            <input type="checkbox" ${emp.connected ? 'checked' : ''} onchange="toggleEmployee(${index})">
                            <button class="delete-employee-btn" onclick="deleteEmployee(${index})" title="Удалить сотрудника">✕</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderConnectedEmployees() {
            const container = document.getElementById('connectedEmployeesList');
            const connected = employees.filter(e => e.connected);
            if (connected.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Нет подключенных сотрудников</p>';
                return;
            }
            container.innerHTML = connected.map(emp => {
                const index = employees.indexOf(emp);
                return `
                    <div class="employee-item">
                        <div class="employee-header">
                            <div class="employee-name">${emp.name}</div>
                            <div class="checkbox-container">
                                <span class="checkbox-label">Данные 2+ недели</span>
                                <input type="checkbox" ${emp.hasData ? 'checked' : ''} onchange="toggleEmployeeData(${index})">
                                <button class="delete-employee-btn" onclick="deleteEmployee(${index})" title="Удалить сотрудника">✕</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleEmployee(index) {
            if (isViewOnlyMode) return;
            employees[index].connected = !employees[index].connected;
            if (!employees[index].connected) employees[index].hasData = false;
            renderEmployees();
            renderConnectedEmployees();
            updateGoals();
            saveToCloud();
        }

        function toggleEmployeeData(index) {
            if (isViewOnlyMode) return;
            employees[index].hasData = !employees[index].hasData;
            updateGoals();
            saveToCloud();
        }

        function addEmployee() {
            if (isViewOnlyMode) return;
            const name = prompt('Введите ФИО сотрудника:');
            if (name) {
                employees.push({ name, connected: false, hasData: false });
                renderEmployees();
                renderConnectedEmployees();
                updateGoals();
                saveToCloud();
            }
        }

        function deleteEmployee(index) {
            if (isViewOnlyMode) return;
            if (!confirm('Удалить сотрудника?')) return;
            employees.splice(index, 1);
            renderEmployees();
            renderConnectedEmployees();
            updateGoals();
            saveToCloud();
        }

        /* функции renderHygieneWeeks/addHygieneWeek/deleteHygieneWeek/updateHygieneWeek,
           renderAccuracyWeeks/addAccuracyWeek/deleteAccuracyWeek/updateAccuracyWeek,
           updateGoals, init и т.д. остаются как в исходном файле */

        function checkViewOnlyMode() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('view') === 'only') {
                isViewOnlyMode = true;
                document.getElementById('adminMode').checked = false;
                document.querySelector('.admin-mode-toggle').style.display = 'none';
                document.getElementById('viewOnlyBanner').classList.add('show');
                document.body.classList.add('readonly');
                return true;
            }
            return false;
        }

        document.getElementById('adminMode').addEventListener('change', function() {
            isViewOnlyMode = !this.checked;
            document.body.classList.toggle('readonly', isViewOnlyMode);
            if (isViewOnlyMode) {
                document.getElementById('viewOnlyBanner').classList.add('show');
            } else {
                document.getElementById('viewOnlyBanner').classList.remove('show');
            }
        });

        async function init() {
            checkViewOnlyMode();
            await loadFromCloud();
            renderEmployees();
            renderConnectedEmployees();
            renderHygieneWeeks();
            renderAccuracyWeeks();
            updateGoals();
        }

        init();

        if (isViewOnlyMode) {
            setInterval(async () => {
                await loadFromCloud();
                renderEmployees();
                renderConnectedEmployees();
                renderHygieneWeeks();
                renderAccuracyWeeks();
                updateGoals();
            }, 10000); // Обновление каждые 10 секунд
        }
    </script>
</body>
</html>
