<div>
    <label><strong>API Key:</strong></label>
    <input type="text" id="apiKey" placeholder="Вставьте ваш API Key">
    
    <label><strong>Bin ID:</strong></label>
    <input type="text" id="binId" placeholder="Вставьте ваш Bin ID">
</div>

<button onclick="testRead()">1️⃣ Тест ЧТЕНИЯ</button>
<button onclick="testWrite()">2️⃣ Тест ЗАПИСИ</button>
<button onclick="clearResults()">🗑️ Очистить</button>

<div id="results"></div>

<script>
    function showResult(message, isSuccess) {
        const div = document.createElement('div');
        div.className = 'result ' + (isSuccess ? 'success' : 'error');
        div.textContent = message;
        document.getElementById('results').appendChild(div);
    }

    function clearResults() {
        document.getElementById('results').innerHTML = '';
    }

    async function testRead() {
        const apiKey = document.getElementById('apiKey').value;
        const binId = document.getElementById('binId').value;

        if (!apiKey || !binId) {
            showResult('❌ Введите API Key и Bin ID!', false);
            return;
        }

        try {
            showResult('🔄 Пытаюсь прочитать данные...', true);
            
            const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                headers: { 'X-Master-Key': apiKey }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const data = await response.json();
            showResult('✅ ЧТЕНИЕ РАБОТАЕТ! Данные: ' + JSON.stringify(data.record).substring(0, 200), true);
            console.log('Полные данные:', data);

        } catch (error) {
            showResult('❌ ОШИБКА ЧТЕНИЯ: ' + error.message, false);
            console.error('Детали ошибки:', error);
        }
    }

    async function testWrite() {
        const apiKey = document.getElementById('apiKey').value;
        const binId = document.getElementById('binId').value;

        if (!apiKey || !binId) {
            showResult('❌ Введите API Key и Bin ID!', false);
            return;
        }

        try {
            showResult('🔄 Пытаюсь записать данные...', true);
            
            const testData = {
                test: 'Проверка записи',
                timestamp: new Date().toISOString(),
                random: Math.random()
            };

            const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': apiKey
                },
                body: JSON.stringify(testData)
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const result = await response.json();
            showResult('✅ ЗАПИСЬ РАБОТАЕТ! Данные сохранены.', true);
            console.log('Результат записи:', result);

        } catch (error) {
            showResult('❌ ОШИБКА ЗАПИСИ: ' + error.message, false);
            console.error('Детали ошибки:', error);
        }
    }
</script>
