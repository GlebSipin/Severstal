<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд — просмотр</title>
    <style>
        :root {
            --bg: #eef3f8;
            --text: #17324d;
            --muted: #5e7288;
            --card: rgba(255,255,255,0.82);
            --border: #d8e2ee;
            --shadow: 0 22px 55px rgba(18, 42, 74, 0.10);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(26,102,185,0.10), transparent 22%), linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
            padding: 24px;
        }
        .view-shell {
            max-width: 1600px;
            margin: 0 auto;
        }
        .view-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }
        .view-title {
            margin: 0;
            font-size: clamp(24px, 3vw, 34px);
            line-height: 1.1;
        }
        .view-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
        }
        .view-badge {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.78);
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(18, 42, 74, 0.08);
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
        }
        .frame-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(1px);
        }
        iframe {
            width: 100%;
            height: calc(100vh - 126px);
            min-height: 820px;
            border: none;
            background: #fff;
        }
        @media (max-width: 900px) {
            body { padding: 14px; }
            .view-head { flex-direction: column; align-items: flex-start; }
            iframe { height: calc(100vh - 150px); min-height: 720px; }
        }
    </style>
</head>
<body>
</html>
