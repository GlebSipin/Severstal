<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд — просмотр</title>
    <style>
        :root {
            --bg: #eef3f8;
            --text: #17324d;
            --muted: #5e7288;
            --card: rgba(255,255,255,0.96);
            --border: #d8e2ee;
            --shadow: 0 18px 44px rgba(18, 42, 74, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
            padding: 20px;
        }
        .view-shell {
            max-width: 1600px;
            margin: 0 auto;
        }
        .view-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        .view-title {
            margin: 0;
            font-size: clamp(24px, 3vw, 34px);
            line-height: 1.1;
        }
        .view-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
        }
        .frame-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(1px);
        }
        iframe {
            width: 100%;
            height: calc(100vh - 112px);
            min-height: 820px;
            border: none;
            background: #fff;
        }
        @media (max-width: 900px) {
            body { padding: 14px; }
            .view-head { flex-direction: column; align-items: flex-start; }
            iframe { height: calc(100vh - 136px); min-height: 720px; }
        }
    </style>
</head>
<body>
    <div class="view-shell">
        <div class="view-head">
            <div>
                <h1 class="view-title">Просмотр дашборда</h1>
                <p class="view-subtitle">Минимум визуального шума и почти незаметное размытие контейнера.</p>
            </div>
        </div>
        <div class="frame-wrap">
            <iframe src="dashboard3.html?view=only"></iframe>
        </div>
    </div>
</body>
</html>
